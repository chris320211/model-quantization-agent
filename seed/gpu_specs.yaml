# NVIDIA GPU family -> compute capability + arch name.
# Keyed by the `gpu` string used in aws_instances.yaml.
# Source: NVIDIA CUDA docs (developer.nvidia.com/cuda-gpus).

K80:        {compute_capability: 3.7, gpu_arch: Kepler}
M60:        {compute_capability: 5.2, gpu_arch: Maxwell}
V100:       {compute_capability: 7.0, gpu_arch: Volta}
V100-32GB:  {compute_capability: 7.0, gpu_arch: Volta}
T4:         {compute_capability: 7.5, gpu_arch: Turing}
T4g:        {compute_capability: 7.5, gpu_arch: Turing}
A10G:       {compute_capability: 8.6, gpu_arch: Ampere}
A100-40GB:  {compute_capability: 8.0, gpu_arch: Ampere}
A100-80GB:  {compute_capability: 8.0, gpu_arch: Ampere}
L4:         {compute_capability: 8.9, gpu_arch: Ada}
L40S:       {compute_capability: 8.9, gpu_arch: Ada}
H100:       {compute_capability: 9.0, gpu_arch: Hopper}
H200:       {compute_capability: 9.0, gpu_arch: Hopper}
B200:       {compute_capability: 10.0, gpu_arch: Blackwell}
