# NVIDIA GPU family -> compute capability + arch + perf specs.
# Keyed by the `gpu` string used in aws_instances.yaml.
# Source: NVIDIA datasheets (developer.nvidia.com/cuda-gpus + per-product spec PDFs).
# Perf fields are dense (non-sparse) tensor-core throughput where applicable.
#   memory_bandwidth_gb_s : per-GPU HBM/GDDR bandwidth
#   peak_fp16_tflops      : tensor-core fp16/bf16 dense throughput
#   int8_tops             : tensor-core int8 dense throughput (0 if pre-Turing)

K80:        {compute_capability: 3.7, gpu_arch: Kepler,    memory_bandwidth_gb_s: 480,  peak_fp16_tflops: 4,    int8_tops: 0}
