    <<: *unknown
    artifact_format: transformers
    measurement_adapter: generic_hf
    support_tier: experimental
    paper_url: https://arxiv.org/abs/2210.17323
    repository_url: https://github.com/IST-DASLab/gptq
  awq:
    <<: *unknown
    artifact_format: transformers
