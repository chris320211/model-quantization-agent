    paper_url: https://arxiv.org/abs/2306.00978
    repository_url: https://github.com/mit-han-lab/llm-awq
  smoothquant:
    <<: *unknown
    artifact_format: transformers_fake_quant
    measurement_adapter: generic_hf
    support_tier: verified
    paper_url: https://arxiv.org/abs/2211.10438
    repository_url: https://github.com/mit-han-lab/smoothquant
    facts:
