# Curated catalog of modern LLM quantization methods.
# Each entry is consumed by tools/recommender.py (hard filters + scoring)
# and by ingest.py (fetches arxiv + repo READMEs into Chroma).
#
# Fields
#   id                   stable key referenced by templates and recommender
#   name                 human name
#   arxiv_id             arxiv identifier or null (e.g. engineering-only methods)
#   repos                list of canonical implementation URLs
#   bits                 list of supported target weight bit-widths
#   quantizes            subset of [weights, activations, kv_cache]
#   needs_calibration    requires a calibration dataset pass
#   qat                  quantization-aware training (vs post-training)
#   inference_backends   runtimes that can execute the quantized weights
#   template             jinja template id in src/quant_agent/templates/, or null if no template yet
#   quality              subjective 0-5: perplexity retention at 4-bit on Llama-class models
#   speedup              subjective 0-5: kernel-level latency improvement on A100/4090
#   maturity             subjective 0-5: how production-ready the tooling is
#   notes                short description used as embedding seed + LLM context

- id: gptq
  name: GPTQ
  arxiv_id: "2210.17323"
  repos:
    - https://github.com/IST-DASLab/gptq
    - https://github.com/ModelCloud/GPTQModel
    - https://github.com/AutoGPTQ/AutoGPTQ
  bits: [2, 3, 4, 8]
  quantizes: [weights]
  needs_calibration: true
  qat: false
  inference_backends: [vllm, transformers, tgi, exllamav2]
  template: gptq
  quality: 4
  speedup: 4
  maturity: 5
  notes: "Layer-wise second-order PTQ using approximate Hessian info. Strong 4-bit baseline, widely supported."

- id: awq
  name: Activation-aware Weight Quantization
  arxiv_id: "2306.00978"
  repos:
    - https://github.com/mit-han-lab/llm-awq
    - https://github.com/casper-hansen/AutoAWQ
  bits: [4]
  quantizes: [weights]
  needs_calibration: true
  qat: false
  inference_backends: [vllm, transformers, tgi]
  template: awq
  quality: 5
  speedup: 4
  maturity: 5
  notes: "Protects salient weight channels using activation magnitudes; typically beats GPTQ at 4-bit for quality."

- id: smoothquant
  name: SmoothQuant
  arxiv_id: "2211.10438"
  repos:
    - https://github.com/mit-han-lab/smoothquant
  bits: [8]
  quantizes: [weights, activations]
  needs_calibration: true
  qat: false
  inference_backends: [vllm, transformers]
  template: null
  quality: 4
  speedup: 3
  maturity: 4
  notes: "Migrates quantization difficulty from activations to weights via per-channel scaling. Enables W8A8."

- id: quip_sharp
  name: "QuIP#"
  arxiv_id: "2402.04396"
  repos:
    - https://github.com/Cornell-RelaxML/quip-sharp
  bits: [2, 3, 4]
  quantizes: [weights]
  needs_calibration: true
  qat: false
  inference_backends: [transformers]
  template: null
  quality: 5
  speedup: 2
  maturity: 3
  notes: "Incoherence processing + lattice codebooks (E8). Pushes 2-bit to usable quality on large models."

- id: spinquant
  name: SpinQuant
  arxiv_id: "2405.16406"
  repos:
    - https://github.com/facebookresearch/SpinQuant
  bits: [4, 8]
  quantizes: [weights, activations, kv_cache]
  needs_calibration: true
  qat: false
  inference_backends: [transformers]
  template: null
  quality: 5
  speedup: 3
  maturity: 3
  notes: "Learned rotations (Cayley-optimized) applied to activations/weights to suppress outliers. Very strong W4A4."

- id: hqq
  name: Half-Quadratic Quantization
