# Fuzzy model name -> canonical HuggingFace model id.
#
# Keys are normalized (lowercase, punctuation stripped) and matched after the
# same normalization is applied to the user's input. Multiple aliases may map
# to the same canonical id.
#
# Extend freely; no code change needed. model_alias.resolve() falls back to
# HfApi.list_models search if no alias matches.

