name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip build
      - run: python -m pip install -c constraints.txt -e '.[dev]'
      - run: pytest -q -W error
      - run: python scripts/check_generated_assets.py
      - run: python -m build
      - name: Verify wheel contains catalogs
        run: |
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile
          wheel = next(Path("dist").glob("*.whl"))
          with ZipFile(wheel) as zf:
              names = set(zf.namelist())
          expected = {
              "quant_agent/data/methods.yaml",
              "quant_agent/data/model_aliases.yaml",
              "quant_agent/data/aws_instances.yaml",
              "quant_agent/data/gpu_specs.yaml",
              "quant_agent/data/method_capabilities.yaml",
          }
          missing = expected - names
          if missing:
              raise SystemExit(f"wheel missing packaged catalogs: {sorted(missing)}")
          PY
