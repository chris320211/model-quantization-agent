schema_version: 1

# Empty lists mean "not established", never "supports everything". The compatibility
# engine treats supported lists as positive evidence unless an explicit allowlist
# policy is present. This conservative baseline is intended to be enriched only from
# primary papers, official repositories, and verified project runs.
defaults: &unknown
  supported_families: []
  unsupported_families: []
  family_policy: evidence
  min_compute_capability: null
  supported_gpu_arches: []
  gpu_arch_policy: evidence
  kernel_constraints: []
  artifact_format: null
  measurement_adapter: null
  support_tier: catalog_only
  facts: []

methods:
